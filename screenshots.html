<!doctype html><html lang="ko"><head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Travelmagic — App Store screenshots</title>
<style>
  :root{--ground:#1E1712;--ground2:#2C2119;--cap:#F5EFE4;--capClay:#E1935F;--capMute:#BAAA98;
    --serif:Georgia,"AppleMyungjo","Nanum Myeongjo",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",Roboto,sans-serif;}
  *{box-sizing:border-box;margin:0}
  body{background:radial-gradient(130% 80% at 50% -8%,var(--ground2),var(--ground) 62%);
    color:var(--cap);font-family:var(--sans);min-height:100vh}
  .page{max-width:1200px;margin:0 auto;padding:34px 20px 70px}
  header{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:8px}
  .wm{font-family:var(--serif);font-size:25px;letter-spacing:.3px}
  .wm b{color:var(--capClay);font-weight:400}
  .sub{font-size:12.5px;color:var(--capMute);letter-spacing:.4px;text-transform:uppercase;margin-top:5px}
  .langtog{display:inline-flex;border:1px solid rgba(245,239,227,.24);border-radius:11px;overflow:hidden;background:rgba(0,0,0,.2)}
  .langtog button{appearance:none;-webkit-appearance:none;border:0;background:transparent;color:var(--capMute);
    font:inherit;font-size:13px;font-weight:600;padding:9px 18px;cursor:pointer}
  .langtog button.on{background:var(--capClay);color:#211a15}
  .note{font-size:12.5px;color:var(--capMute);margin:14px 2px 24px;line-height:1.6;max-width:74ch}
  .note b{color:var(--cap)}
  .strip{display:flex;gap:20px;overflow-x:auto;padding:4px 2px 24px;scroll-snap-type:x mandatory}
  .strip::-webkit-scrollbar{height:9px}
  .strip::-webkit-scrollbar-thumb{background:rgba(245,239,227,.18);border-radius:20px}
  .strip img{flex:0 0 auto;width:300px;max-width:78vw;border-radius:18px;scroll-snap-align:center;
    box-shadow:0 24px 60px -26px rgba(0,0,0,.7)}
  .meta{font-size:12px;color:var(--capMute);margin-top:8px;text-align:center;line-height:1.5}
  .meta b{color:var(--cap)}
</style></head><body>
<div class="page">
  <header>
    <div><div class="wm">Travel<b>magic</b></div><div class="sub" id="sub">App Store screenshots · 1320×2868</div></div>
    <div class="langtog" role="group" aria-label="Language">
      <button type="button" data-l="ko" class="on">한국어</button>
      <button type="button" data-l="en">English</button>
    </div>
  </header>
  <p class="note" id="note"></p>
  <div class="strip" id="strip"></div>
  <p class="meta" id="foot"></p>
</div>
<script>
  var NAMES=['01-today','02-gap','03-setup','04-packing','05-journal'];
  var TXT={
    ko:{sub:'앱스토어 스크린샷 · 1320×2868',
      note:'실제 앱 화면을 코드의 정확한 값(여백 22·폰트 크기·명조 서체)으로 재현했어요. 아이폰 6.9″ 마스터 해상도 <b>1320×2868</b>(알파 없음) — App Store가 작은 기기로 자동 축소합니다. 위 토글로 <b>한국어 / English</b> 완전 분리 확인.',
      foot:'업로드 순서: ' + NAMES.join(' → ')},
    en:{sub:'App Store screenshots · 1320×2868',
      note:'The real app screens, reproduced from the code’s exact values (22px padding, font sizes, myeongjo serif). iPhone 6.9″ master <b>1320×2868</b> (no alpha) — App Store auto-scales it down. Toggle above to verify <b>한국어 / English</b> are fully separated.',
      foot:'Upload order: ' + NAMES.join(' → ')}
  };
  var lang='ko';
  function render(){
    var t=TXT[lang]; document.documentElement.lang=lang;
    document.getElementById('sub').textContent=t.sub;
    document.getElementById('note').innerHTML=t.note;
    document.getElementById('foot').innerHTML=t.foot;
    document.getElementById('strip').innerHTML=NAMES.map(function(n,i){
      return '<img src="shots/'+lang+'/'+n+'.png" alt="'+n+'" loading="lazy" width="1320" height="2868">';
    }).join('');
    document.querySelectorAll('.langtog button').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-l')===lang);});
  }
  document.querySelectorAll('.langtog button').forEach(function(b){
    b.addEventListener('click',function(){lang=b.getAttribute('data-l');render();});
  });
  render();
</script>
</body></html>
